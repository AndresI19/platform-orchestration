name: ci

on:
  pull_request:
  push:
    branches: [main]

# This repo ships manifests, not an image, so the security gate is a Trivy CONFIG scan of the
# Kubernetes YAML (misconfigurations: missing securityContext, no resource limits, root filesystems,
# and so on) rather than an image scan.
#
# It is a BLOCKING gate (exit-code 1) at HIGH,CRITICAL. Every workload was hardened in the 2026-07-13
# pass — pod- and container-level securityContext, readOnlyRootFilesystem with writable emptyDir
# mounts for the paths that genuinely need them — so the scan is clean, and any new manifest that
# regresses below that bar fails its PR here instead of reaching the cluster.
jobs:
  config-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan (k8s manifests)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: k8s
          severity: HIGH,CRITICAL
          exit-code: "1" # blocking — the manifests are hardened; a regression should fail the PR

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Render every overlay and schema-validate it — the "lint" for a Kustomize platform. kustomize
      # build catches a broken/unresolvable overlay; kubeconform -strict catches an invalid manifest
      # (a typo'd apiVersion, a misindented field) before it ever reaches the cluster. SealedSecret is
      # a CRD with no public schema, so -ignore-missing-schemas skips it rather than erroring.
      - name: Install kustomize + kubeconform
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" | tar xz
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
          sudo mv kustomize kubeconform /usr/local/bin/
      - name: Render + schema-validate every overlay
        run: |
          set -euo pipefail
          for overlay in k8s k8s/overlays/public; do
            echo "== $overlay =="
            kustomize build "$overlay" | kubeconform -strict -ignore-missing-schemas -summary -
          done
