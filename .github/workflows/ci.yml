name: ci

on:
  pull_request:
  push:
    branches: [main]

# This repo ships MANIFESTS, not an image, so the security gate is a Trivy CONFIG scan of the rendered
# Kubernetes YAML (missing securityContext, no resource limits, writable root fs, …), not an image scan.
#
# The platform runs on HELM: per-component releases — `platform-infra` (router, databases, tunnel,
# config, version spec) plus one per service, each from the generic `charts/service` chart and the
# service's OWN deploy/<name>.values.yaml.
#
# THAT SPLIT IS WHY THE SIBLING REPOS ARE CHECKED OUT BELOW. The services' values live in the repos
# that ship them, so rendering only what THIS repo owns would scan the infra and silently stop scanning
# the five app workloads while still reporting green — a gate that protects nothing but passes, worse
# than none. So CI renders each service exactly as a deploy does: our chart, their values. Public repos;
# the default GITHUB_TOKEN reads them with no extra credential.
#
# Both infra value sets (local defaults + public overlay) cover the local and live topology. k8s/ is
# bootstrap only now (namespace, PVCs, sealed secrets, deployer RBAC), scanned separately.
#
# config-scan is a BLOCKING gate (exit-code 1) at HIGH,CRITICAL. Every workload is hardened, so the
# scan is clean and any regression below that bar fails its PR here instead of reaching the cluster.
jobs:
  config-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with: { repository: AndresI19/project-platform, path: repos/project-platform }
      - uses: actions/checkout@v4
        with: { repository: AndresI19/data-driven-quiz-server, path: repos/data-driven-quiz-server }
      - uses: actions/checkout@v4
        with: { repository: AndresI19/open-vMCP, path: repos/open-vMCP }
      - uses: actions/checkout@v4
        with: { repository: AndresI19/rs-mcp-server, path: repos/rs-mcp-server }
      - name: Install helm
        run: |
          curl -sSL "https://get.helm.sh/helm-v4.2.3-linux-amd64.tar.gz" | tar xz
          sudo mv linux-amd64/helm /usr/local/bin/
      - name: Render every release (infra local + public, and each service)
        run: ./scripts/render-all.sh rendered
      # The workloads — the actual thing the gate protects. Hardened, so this is clean; a regression
      # (a Pod with no securityContext, a container without resource limits) fails the PR here.
      - name: Trivy config scan (rendered workloads)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: rendered
          severity: HIGH,CRITICAL
          exit-code: "1"
      # The bootstrap manifests (namespace, PVCs, sealed secrets, deployer RBAC) — scanned too, so a
      # regression here is caught. The deployer Role's two intentional grants are ignored with a
      # documented rationale in .trivyignore.
      - name: Trivy config scan (bootstrap)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: k8s
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with: { repository: AndresI19/project-platform, path: repos/project-platform }
      - uses: actions/checkout@v4
        with: { repository: AndresI19/data-driven-quiz-server, path: repos/data-driven-quiz-server }
      - uses: actions/checkout@v4
        with: { repository: AndresI19/open-vMCP, path: repos/open-vMCP }
      - uses: actions/checkout@v4
        with: { repository: AndresI19/rs-mcp-server, path: repos/rs-mcp-server }
      # Render the charts and schema-validate them — the "lint" for a Helm platform. helm template
      # catches a broken/unrenderable template; kubeconform -strict catches an invalid manifest (a
      # typo'd apiVersion, a misindented field) before it reaches the cluster. SealedSecret is a CRD
      # with no public schema, so -ignore-missing-schemas skips it rather than erroring.
      - name: Install helm + kubeconform
        run: |
          curl -sSL "https://get.helm.sh/helm-v4.2.3-linux-amd64.tar.gz" | tar xz
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
          sudo mv linux-amd64/helm kubeconform /usr/local/bin/
      - name: Render + schema-validate every release
        run: |
          set -euo pipefail
          ./scripts/render-all.sh rendered
          for f in rendered/*.yaml; do
            echo "== kubeconform $f =="
            kubeconform -strict -ignore-missing-schemas -summary "$f"
          done
