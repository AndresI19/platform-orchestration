{{- /*
A deliberately dumb LOCAL front door: every path goes to nginx, which owns the routing. The public
site does not arrive here — it comes through cloudflared, which reaches the same nginx Service from
inside the cluster with no ingress controller in the path.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  namespace: {{ .Release.Namespace }}
  annotations:
    # MCP streams over SSE / streamable-HTTP; buffering would hold a tool result until the connection
    # closed, which a client experiences as a hang.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port: { number: 8080 }
