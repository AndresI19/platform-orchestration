{{- /*
Writes platform-version.json onto the content PVC — the platform's OWN version (this repo ships no
image, so its version cannot ride in one). home serves it at /version and /api/versions per request,
so a redeploy updates the reported version with no rollout of home.

Only `platform` is written now. The umbrella chart also rendered a `components` map, but home never
read it — versions.ts reads only spec.platform and gets each component's version from a LIVE fan-out
to the services' /version endpoints. Split into their own releases, this infra release no longer knows
their versions and doesn't need to.

A Helm HOOK, not a normal resource, and that is the design:
  * The platform version resolves into VALUES before the deploy (k8s/deploy.sh --set), so the release
    is versioned and `helm get values` shows what is live.
  * The Job renders the JSON from that value, so it can never disagree with what was deployed.
  * It fires on post-rollback too, so `helm rollback platform-infra` rewrites the file.
Writing needs a pod (the volume only exists in the cluster), so the Job mounts the PVC read-WRITE;
busybox because it is already in the node and needs no pull.

WHAT PROTECTS THIS FILE. It used to be the mount — home held the volume read-only and could not rewrite
the record of what is deployed. No longer: home mounts /content read-write for its admin résumé-upload
route (project-platform, src/server/content.ts), and nothing at the filesystem layer stops it (volume
owned 1000:1000, home runs uid 1000, and POSIX takes rename/unlink permission from the DIRECTORY's
write bit, not the target file's owner). What keeps this file the deploy's alone is home's ALLOWLIST —
exactly resume.pdf and cards/<name>.yaml, tested against precisely this path. Widen it and this file
loses its last protection, so it is named here where the next reader will look.
*/ -}}
{{- $spec := dict "platform" .Values.platform.version "deployedAt" (now | date "2006-01-02T15:04:05Z07:00") -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-version-writer
  namespace: {{ .Release.Namespace }}
  labels:
    app: version-writer
  annotations:
    "helm.sh/hook": post-install,post-upgrade,post-rollback
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels: { app: version-writer }
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 0
      # Same non-root identity home/quiz use to write this PVC (uid/gid 1000, fsGroup 1000; volume
      # owned 1000:1000, so no root needed). Hardened like every workload: read-only rootfs (it writes
      # only the mounted /content), no privilege escalation, all capabilities dropped.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: writer
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Spec rendered by Helm from values (single-line toJson — our version never contains a single
          # quote, so single-quoting is safe). 0644 because this volume is public content; the mode is
          # ASSERTED, not `test -r`, so a regression leaving it unreadable by home fails the deploy
          # loudly rather than serving null.
          command:
            - sh
            - -c
            - |
              printf '%s\n' '{{ $spec | toJson }}' > /content/platform-version.json
              chmod 0644 /content/platform-version.json
              [ "$(stat -c %a /content/platform-version.json)" = "644" ] \
                || { echo "FATAL: version spec unreadable by home" >&2; exit 1; }
              echo "platform-version.json -> platform {{ .Values.platform.version }}"
          volumeMounts:
            - { name: content, mountPath: /content }
      volumes:
        - name: content
          persistentVolumeClaim: { claimName: platform-content }
