{{- /*
The public front door — off unless cloudflared.enabled (values-public.yaml). It dials OUT to
Cloudflare and reaches the nginx Service from inside the cluster, so there is no inbound port, no
LoadBalancer, and the home IP never enters DNS. No Service: nothing dials into it.
*/ -}}
{{- if .Values.cloudflared.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: {{ .Release.Namespace }}
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflared.image }}
          args: ["tunnel", "--no-autoupdate", "run"]
          securityContext:
            {{- include "platform.containerSecurity" (dict) | nindent 12 }}
          env:
            # NOT optional: a missing token should stop the Pod loudly, not start a connector that
            # silently serves nothing. Created out-of-band; sealed in k8s/bootstrap/.
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef: { name: cloudflared, key: TUNNEL_TOKEN }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
      volumes:
        - { name: tmp, emptyDir: {} }
{{- end }}
