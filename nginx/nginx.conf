events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Resolve upstreams at REQUEST time via Docker's embedded DNS (not at startup), so nginx boots
  # even if an app container is briefly unavailable. Using a variable in proxy_pass is what defers
  # resolution — and with no URI part on proxy_pass the original request path is forwarded UNCHANGED,
  # which is what each base-path-aware app expects.
  resolver 127.0.0.11 ipv6=off valid=10s;

  # One entry point (:8080) that reconciles the three app containers by URL path.
  server {
    listen 8080;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Personal home page — the root.
    location / {
      set $home http://home:3000;
      proxy_pass $home;
    }

    # Cloud Developer Quiz.
    location = /cloud-developer-quiz { return 301 /cloud-developer-quiz/; }
    location /cloud-developer-quiz/ {
      set $quiz http://quiz:80;
      proxy_pass $quiz;
    }

    # open-vMCP Carbon dashboard.
    location = /vmcp { return 301 /vmcp/; }
    location /vmcp/ {
      set $vmcp http://vmcp:8001;
      proxy_pass $vmcp;
    }

    # The MCP endpoint Claude Desktop connects to — kept at the gateway root (the vMCP server
    # serves /mcp at its own root). Point a client at http://<host>:8080/mcp.
    location /mcp {
      set $vmcpmcp http://vmcp:8001;
      proxy_pass $vmcpmcp;
    }
  }
}
