# Local demo stack: nginx reconciles three app containers onto one port (8080) by URL path.
# Only nginx is published; the apps talk over the internal `platform` network by service name.
#
#   http://localhost:8080/                       → home
#   http://localhost:8080/cloud-developer-quiz/  → quiz
#   http://localhost:8080/vmcp/                   → vMCP dashboard
#   http://localhost:8080/mcp                     → vMCP MCP endpoint (for Claude Desktop)
#
# Build contexts point at the sibling repos under claude-workspace/. Run: docker compose up --build
services:
  home:
    build: ../portfolio-home
    environment:
      PORT: "3000"
    expose:
      - "3000"
    networks: [platform]
    restart: unless-stopped

  quiz:
    build:
      context: ../flashcards-app
      args:
        BASE_PATH: /cloud-developer-quiz/
    environment:
      PORT: "80"
      BASE_PATH: /cloud-developer-quiz/
    expose:
      - "80"
    networks: [platform]
    restart: unless-stopped

  vmcp:
    build: ../open-vMCP
    environment:
      PORT: "8001"
      DATABASE_URL: postgres://vmcp:vmcp@vmcp-db:5432/vmcp
      # Register rs-mcp-server at its in-network address so it's always attached to the gateway.
      SEED_URL_RS_MCP: http://rs-mcp-server:8000/sse
      # Link the dashboard's "← Home" back to the platform home (through the proxy).
      HOME_URL: /
    depends_on:
      vmcp-db:
        condition: service_healthy
      rs-mcp-server:
        condition: service_started
    expose:
      - "8001"
    networks: [platform]
    restart: unless-stopped

  rs-mcp-server:
    build: ../rs-mcp-server
    expose:
      - "8000"
    networks: [platform]
    restart: unless-stopped

  vmcp-db:
    image: postgres:16
    environment:
      POSTGRES_USER: vmcp
      POSTGRES_PASSWORD: vmcp
      POSTGRES_DB: vmcp
    volumes:
      - vmcp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmcp -d vmcp"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [platform]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [home, quiz, vmcp]
    networks: [platform]
    restart: unless-stopped

networks:
  platform:
    driver: bridge

volumes:
  vmcp_pgdata:
