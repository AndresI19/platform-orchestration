# Deploy values for home — extracted verbatim from the umbrella chart's apps.home block,
# plus the `name` field the service chart needs. In stage 2 this moves to home's own repo as
# deploy/values.yaml.
name: home
image:
  repo: platform-home
  tag: latest
version: 0.0.0
port: 3000
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 256Mi
probe:
  path: /api/health
  initialDelaySeconds: 3
env:
  - name: PORT
    value: '3000'
  - name: VMCP_API_BASE
    valueFrom:
      configMapKeyRef:
        name: platform-config
        key: VMCP_API_BASE
  - name: DISCORD_WEBHOOK_URL
    valueFrom:
      secretKeyRef:
        name: platform-secrets
        key: DISCORD_WEBHOOK_URL
        optional: true
initContainers:
  - name: seed-resume
    command:
      - sh
      - '-c'
      - cp -n /app/dist/client/resume.pdf /content/resume.pdf || true; ls -l /content/resume.pdf
    volumeMounts:
      - name: content
        mountPath: /content
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
volumeMounts:
  - name: content
    mountPath: /app/dist/client/resume.pdf
    subPath: resume.pdf
    readOnly: true
  - name: content
    mountPath: /content
    readOnly: true
volumes:
  - name: content
    persistentVolumeClaim:
      claimName: platform-content
