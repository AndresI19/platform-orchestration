# Deploy values for rs-mcp-server — extracted verbatim from the umbrella chart's apps.rs-mcp-server block,
# plus the `name` field the service chart needs. In stage 2 this moves to rs-mcp-server's own repo as
# deploy/values.yaml.
name: rs-mcp-server
image:
  repo: platform-rs-mcp-server
  tag: latest
version: 0.0.0
port: 8000
resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    memory: 512Mi
probe:
  path: /health
  initialDelaySeconds: 3
livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 30
env:
  - name: PYTHONDONTWRITEBYTECODE
    value: '1'
