# Default (LOCAL) values for the platform chart — the Kubernetes equivalent of `docker compose up`
# with an unfilled .env. values-public.yaml layers the public front door (cloudflared + real
# hostnames) on top; k8s/deploy.sh overrides every image tag and version from git via --set.
#
# What is NOT here, on purpose: the namespace, the deployer RBAC, the SealedSecrets, and the three
# PVCs. Those are bootstrap (k8s/bootstrap/, applied with kubectl) so Helm never manages secrets or
# risks the Postgres data, and the SealedSecrets keep working un-re-sealed (they are crypto-bound to
# namespace + name, both unchanged).

# The orchestration repo's own version. It ships no image, so its version rides on the content volume
# instead — set here at deploy from git, then written to platform-version.json by the version-writer
# hook and served by home at /version. 0.0.0 is only the un-deployed default.
platform:
  version: "0.0.0"

# The platform-config ConfigMap. LOCAL defaults = same-origin (empty). The apps read these as env at
# startup, so a change needs a rollout restart — except nginx, whose conf rolls on a checksum.
config:
  VMCP_API_BASE: ""
  CORS_ORIGINS: ""
  HOME_URL: "/"
  MCP_PUBLIC_URL: ""
  AUTH_ISSUER: "https://api-andres.project-platform.me/auth"
  AUTH_JWKS_URI: "http://platform-auth:8002/.well-known/jwks.json"

# The public front door. OFF locally; values-public.yaml flips it on. This is a CUTOVER, not an
# addition — Cloudflare load-balances across every connector on a tunnel, so two split live traffic.
cloudflared:
  enabled: false
  image: cloudflare/cloudflared:latest

# The router. Its conf lives in chart/files/nginx.conf; a checksum/config pod annotation rolls the
# Deployment when the conf changes (Helm has no configMapGenerator).
nginx:
  image: nginx:1.27-alpine

# The two Postgres servers. PVCs are bootstrap (not the chart); these own the Deployment + Service,
# and platform-db additionally seeds two databases via init.sql on an empty volume.
databases:
  platform-db:
    pvcName: platform-db
    secretName: platform-db
    probe: ["pg_isready", "-U", "platform"]
    initSql: |
      CREATE DATABASE auth;
      CREATE DATABASE quiz;
  vmcp-db:
    pvcName: vmcp-db
    secretName: vmcp-db
    probe: ["pg_isready", "-U", "vmcp", "-d", "vmcp"]

# The six app workloads. Each renders through templates/_app.tpl. image.tag + version are set per
# deploy from git; image.repo is the local side-loaded name (Phase 2 CI overrides it to
# registry:5000/<component>). env / initContainers / volumeMounts / volumes are the per-app YAML the
# generic template splices in; the shared boilerplate (securityContext, tmp mount, labels) is in the
# template. An initContainer with no `image` inherits the app image — the seed steps rely on that.
apps:
  home:
    image: { repo: platform-home, tag: latest }
    version: "0.0.0"
    port: 3000
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits: { memory: 256Mi }
    probe: { path: /api/health, initialDelaySeconds: 3 }
    env:
      - { name: PORT, value: "3000" }
      - name: VMCP_API_BASE
        valueFrom:
          configMapKeyRef: { name: platform-config, key: VMCP_API_BASE }
      - name: DISCORD_WEBHOOK_URL
        valueFrom:
          secretKeyRef: { name: platform-secrets, key: DISCORD_WEBHOOK_URL, optional: true }
    initContainers:
      - name: seed-resume
        command: ["sh", "-c", "cp -n /app/dist/client/resume.pdf /content/resume.pdf || true; ls -l /content/resume.pdf"]
        volumeMounts:
          - { name: content, mountPath: /content }
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits: { memory: 128Mi }
    volumeMounts:
      - { name: content, mountPath: /app/dist/client/resume.pdf, subPath: resume.pdf, readOnly: true }
      - { name: content, mountPath: /content, readOnly: true }
    volumes:
      - name: content
        persistentVolumeClaim: { claimName: platform-content }

  quiz:
    image: { repo: platform-quiz, tag: latest }
    version: "0.0.0"
    port: 80
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits: { memory: 256Mi }
    probe: { path: /cloud-developer-quiz/api/health, initialDelaySeconds: 3 }
    env:
      - { name: PORT, value: "80" }
      - { name: BASE_PATH, value: "/cloud-developer-quiz/" }
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef: { name: quiz-db, key: DATABASE_URL }
      - name: AUTH_JWKS_URI
        valueFrom:
          configMapKeyRef: { name: platform-config, key: AUTH_JWKS_URI }
      - name: AUTH_ISSUER
        valueFrom:
          configMapKeyRef: { name: platform-config, key: AUTH_ISSUER }
      - { name: AUTH_AUDIENCE, value: "platform" }
    initContainers:
      - name: seed-cards
        command: ["sh", "-c", "mkdir -p /content/cards && cp -rn /app/cards/. /content/cards/ && echo \"cards on volume: $(ls /content/cards | wc -l)\""]
        volumeMounts:
          - { name: content, mountPath: /content }
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits: { memory: 128Mi }
    volumeMounts:
      - { name: content, mountPath: /app/cards, subPath: cards }
    volumes:
      - name: content
        persistentVolumeClaim: { claimName: platform-content }

  vmcp:
    image: { repo: platform-vmcp, tag: latest }
    version: "0.0.0"
    port: 8001
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { memory: 512Mi }
    probe: { path: /health, initialDelaySeconds: 5 }
    env:
      - { name: PORT, value: "8001" }
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef: { name: vmcp-db, key: DATABASE_URL }
      - { name: SEED_URL_RS_MCP, value: "http://rs-mcp-server:8000/sse" }
      - name: HOME_URL
        valueFrom:
          configMapKeyRef: { name: platform-config, key: HOME_URL }
      - name: VMCP_API_BASE
        valueFrom:
          configMapKeyRef: { name: platform-config, key: VMCP_API_BASE }
      - name: CORS_ORIGINS
        valueFrom:
          configMapKeyRef: { name: platform-config, key: CORS_ORIGINS }
      - name: MCP_PUBLIC_URL
        valueFrom:
          configMapKeyRef: { name: platform-config, key: MCP_PUBLIC_URL }
    initContainers:
      - name: wait-for-db
        image: postgres:16
        command: ["sh", "-c", "until pg_isready -h vmcp-db -U vmcp -d vmcp; do echo waiting for db; sleep 2; done"]
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits: { memory: 128Mi }

  rs-mcp-server:
    image: { repo: platform-rs-mcp-server, tag: latest }
    version: "0.0.0"
    port: 8000
    resources:
      requests: { cpu: 25m, memory: 128Mi }
      limits: { memory: 512Mi }
    probe: { path: /health, initialDelaySeconds: 3 }
    livenessProbe: { path: /health, initialDelaySeconds: 15, periodSeconds: 30 }
    env:
      - { name: PYTHONDONTWRITEBYTECODE, value: "1" }

  platform-auth:
    image: { repo: platform-platform-auth, tag: latest }
    version: "0.0.0"
    port: 8002
    resources:
      requests: { cpu: 25m, memory: 96Mi }
      limits: { memory: 384Mi }
    probe: { path: /health, initialDelaySeconds: 4 }
    env:
      - { name: PORT, value: "8002" }
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef: { name: platform-auth, key: DATABASE_URL }
      - name: AUTH_SIGNING_KEY
        valueFrom:
          secretKeyRef: { name: platform-auth, key: AUTH_SIGNING_KEY }
      - name: AUTH_CODE_PEPPER
        valueFrom:
          secretKeyRef: { name: platform-auth, key: AUTH_CODE_PEPPER }
      - name: AUTH_ISSUER
        valueFrom:
          configMapKeyRef: { name: platform-config, key: AUTH_ISSUER }
      - { name: AUTH_AUDIENCE, value: "platform" }
      - name: AUTH_ADMINS
        valueFrom:
          secretKeyRef: { name: platform-auth, key: AUTH_ADMINS }
    initContainers:
      - name: wait-for-db
        image: postgres:16
        command: ["sh", "-c", "until pg_isready -h platform-db -U platform; do echo waiting for db; sleep 2; done"]
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits: { memory: 128Mi }
