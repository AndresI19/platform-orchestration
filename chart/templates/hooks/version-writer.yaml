{{- /*
Writes platform-version.json onto the content PVC — the platform's OWN version (the orchestration
repo ships no image, so its version cannot ride in one) plus what every component was deployed at.
home mounts /content read-only and serves this at /version and /api/versions, per request, so this
updates the reported version with no rollout of home.

This is a Helm HOOK, not a normal resource, and that is the whole design the user asked for:
  * The versions are resolved into VALUES before the deploy (k8s/deploy.sh --set), so the release is
    versioned and `helm get values` shows exactly what is live.
  * The Job renders the JSON from those values, so it can never disagree with what was deployed.
  * It fires on post-rollback too, so `helm rollback` rewrites the file to the rolled-back version —
    the images and the reported version move together.
  * --wait/--atomic treat a failed hook as a failed release, so a version write that cannot be read
    back fails the deploy loudly, preserving deploy.sh's old "assert the mode or FATAL" property.

Writing needs a pod because the volume only exists in the cluster, and it mounts the PVC read-WRITE —
which home deliberately cannot (a web server must not rewrite the record of what is deployed). busybox
is used because it is already in the node and needs no pull.
*/ -}}
{{- $components := dict -}}
{{- range $name, $app := .Values.apps -}}
{{-   $_ := set $components $name (dict "version" $app.version "image" (printf "%s:%s" $app.image.repo $app.image.tag)) -}}
{{- end -}}
{{- $spec := dict "platform" .Values.platform.version "deployedAt" (now | date "2006-01-02T15:04:05Z07:00") "components" $components -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-version-writer
  namespace: {{ .Release.Namespace }}
  labels:
    app: version-writer
  annotations:
    "helm.sh/hook": post-install,post-upgrade,post-rollback
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    metadata:
      labels: { app: version-writer }
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 0
      containers:
        - name: writer
          image: busybox:1.36
          # The spec is rendered by Helm from values (single-line toJson — our versions/images never
          # contain a single quote, so single-quoting is safe). 0644 because everything on this volume
          # is public content and home mounts it read-only; the mode is ASSERTED, not `test -r`,
          # because this writer runs as root and root can read a 0600 file — the question is whether
          # home's DIFFERENT user can, which is a question about the mode.
          command:
            - sh
            - -c
            - |
              printf '%s\n' '{{ $spec | toJson }}' > /content/platform-version.json
              chmod 0644 /content/platform-version.json
              [ "$(stat -c %a /content/platform-version.json)" = "644" ] \
                || { echo "FATAL: version spec unreadable by home" >&2; exit 1; }
              echo "platform-version.json -> platform {{ .Values.platform.version }}"
          volumeMounts:
            - { name: content, mountPath: /content }
      volumes:
        - name: content
          persistentVolumeClaim: { claimName: platform-content }
