# Replays rs-mcp-server's FVT suite through the gateway on an interval, so the vMCP dashboard's
# Recent Calls and Tool Usage views show real tool invocations instead of an empty table.
#
# Why a Deployment and not a CronJob, which is the idiomatic Kubernetes shape for "every 4 hours":
# the image's entrypoint (scripts/fvt_traffic.sh) is a `while true` loop that mints its own bearer
# token, pins FVT_MCP_PATH to the gateway's 1:1 passthrough route, and sleeps FVT_INTERVAL_SECONDS
# between runs. It never exits, so a CronJob Pod would never complete. Turning it into a CronJob
# means re-implementing that setup inline in YAML, where it would silently drift from the script it
# was copied from the first time the script's route or auth changed.
#
# The clean version of the CronJob is a small FVT_ONCE flag in rs-mcp-server's own repo, letting the
# script run a single pass and exit; then this becomes a CronJob with `schedule: "0 */4 * * *"` and
# `concurrencyPolicy: Forbid`, and FVT_INTERVAL_SECONDS goes away. Tracked as a follow-up — porting
# the orchestration should not require editing the app being orchestrated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fvt-traffic
  namespace: platform
spec:
  replicas: 1
  # The suite makes ~54 live calls to the RuneScape wiki / GE APIs per run. Two Pods overlapping
  # during a rollout would double that against someone else's API for no extra signal.
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: fvt-traffic }
  template:
    metadata:
      labels: { app: fvt-traffic }
    spec:
      containers:
        - name: fvt-traffic
          image: platform-fvt-traffic:latest
          imagePullPolicy: IfNotPresent
          env:
            # The script already waits on the gateway's /health before its first run, so no
            # initContainer is needed to order this behind vmcp.
            - { name: VMCP_URL, value: "http://vmcp:8001" }
            - name: FVT_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef: { name: platform-config, key: FVT_INTERVAL_SECONDS }
            # The runner signs in like anybody else now. It used to forge its own token — an unsigned
            # base64 blob the gateway accepted because nothing checked. Turning on verification broke
            # that, which is precisely what verification is for.
            - { name: AUTH_URL, value: "http://platform-auth:8002" }
            - name: FVT_CODE
              valueFrom:
                secretKeyRef: { name: fvt-auth, key: FVT_CODE }
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits: { memory: 512Mi }
