apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: quiz }
  template:
    metadata:
      labels: { app: quiz }
    spec:
      # Unprivileged, non-root, read-only root fs. fsGroup lets uid 1000 write the content volume that
      # the seed step below populates.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      # Copies the image's baked-in card decks onto the content volume the first time only. `cp -rn`
      # (no-clobber) is what makes this safe to run on every boot: once you have edited a deck on the
      # volume, a restart will not quietly stamp the image's version back over it.
      #
      # This must be an initContainer rather than a Job, because the main container mounts
      # /content/cards by subPath — and a subPath that does not exist yet is created by the kubelet
      # as an empty DIRECTORY. Seeding here guarantees the path is populated before that resolution
      # happens.
      initContainers:
        - name: seed-cards
          image: platform-quiz:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          command:
            ["sh", "-c", "mkdir -p /content/cards && cp -rn /app/cards/. /content/cards/ && echo \"cards on volume: $(ls /content/cards | wc -l)\""]
          volumeMounts:
            - { name: content, mountPath: /content }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
      containers:
        - name: quiz
          image: platform-quiz:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          env:
            - { name: PORT, value: "80" }
            # Must match the BASE_PATH baked into the image at build time.
            - { name: BASE_PATH, value: "/cloud-developer-quiz/" }
            # Progress sync is OPTIONAL: with no DATABASE_URL the quiz runs exactly as it always has,
            # entirely in the browser. These three switch it on.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: quiz-db, key: DATABASE_URL }
            - name: AUTH_JWKS_URI
              valueFrom:
                configMapKeyRef: { name: platform-config, key: AUTH_JWKS_URI }
            - name: AUTH_ISSUER
              valueFrom:
                configMapKeyRef: { name: platform-config, key: AUTH_ISSUER }
            - { name: AUTH_AUDIENCE, value: "platform" }
          volumeMounts:
            # Shadows the image's own /app/cards, so the server's hardcoded
            # `CARDS_DIR = resolve(ROOT, 'cards')` reads the volume with no code change.
            #
            # Note the server calls buildCards() ONCE at startup and serves the result as static
            # JSON — so editing a deck on the volume does nothing until the pod restarts:
            #     kubectl -n platform rollout restart deploy/quiz
            - name: content
              mountPath: /app/cards
              subPath: cards
            # A read-only root filesystem still needs a writable /tmp for the Node runtime.
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /cloud-developer-quiz/api/health, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 256Mi }
      volumes:
        - name: content
          persistentVolumeClaim: { claimName: platform-content }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: quiz
  namespace: platform
spec:
  selector: { app: quiz }
  ports: [{ port: 80, targetPort: 80 }]
