# Editable content, lifted OUT of the images and onto a volume.
#
# resume.pdf and the quiz's card decks used to be baked in, so changing a card's wording or dropping
# in a new résumé meant rebuilding and reloading a 500MB image. They are content, not code: they
# change on a different clock than the app that serves them. On this volume they can be replaced with
# a `kubectl cp` and a rollout restart.
#
#   /content/resume.pdf              → mounted into home at /app/dist/client/resume.pdf
#   /content/cards/*.yaml            → mounted into quiz at /app/cards
#   /content/platform-version.json   → the version spec, written by k8s/deploy.sh and read by home
#
# The version spec is the one item here that is not hand-edited content: it is WRITTEN BY THE DEPLOY
# and records what that deploy put on the cluster. It is on this volume for the same reason as the
# rest of it, though — the platform's own version belongs to the orchestration repo, which ships no
# image, so unlike every component's version it has nothing to be baked into. home mounts the volume
# read-only and serves it at /version; deploy.sh writes it through a separate ephemeral pod, because a
# public web server should not be able to rewrite the record of what is deployed.
#
# Seeding: each Deployment carries an initContainer that copies its own baked-in defaults onto the
# volume IF they are not already there. That keeps the images self-contained (they still run fine
# standalone, and `docker run` is unaffected), makes a fresh cluster come up populated with no manual
# step, and — because it only copies when absent — never overwrites content you have since edited.
#
# ReadWriteOnce is honest here rather than aspirational: minikube's hostPath provisioner is
# single-node, and RWO is enforced per NODE, so home and quiz can both mount this concurrently. On a
# real multi-node cluster this would need RWX (an NFS/CSI class) or one volume per app — flagged in
# k8s/README.md rather than papered over.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-content
  namespace: platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 256Mi
