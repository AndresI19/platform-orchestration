apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: home }
  template:
    metadata:
      labels: { app: home }
    spec:
      # Runs unprivileged, non-root, on a read-only root filesystem. The node user (1000) exists in the
      # base image; fsGroup lets it write the content volume that the seed step below populates.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      # Copies the image's baked-in résumé onto the content volume, once. `cp -n` (no-clobber) means
      # a restart never stamps the image's version back over a résumé you have since replaced.
      #
      # It must run before the main container, and not merely for ordering's sake: the main container
      # mounts resume.pdf as a SINGLE FILE via subPath, and the kubelet resolves a missing subPath by
      # creating an empty DIRECTORY at that path. Without this seed, `home` would serve a directory
      # where the PDF should be.
      initContainers:
        - name: seed-resume
          image: platform-home:latest
          imagePullPolicy: IfNotPresent
          command:
            ["sh", "-c", "cp -n /app/dist/client/resume.pdf /content/resume.pdf || true; ls -l /content/resume.pdf"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: content, mountPath: /content }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
      containers:
        - name: home
          image: platform-home:latest
          # Local images side-loaded with `minikube image load` — no registry backs this tag, so a
          # pull would fail. (`minikube docker-env` is NOT usable on this box; see k8s/README.md.)
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
            # Where the page's liveness probes read the gateway registry from. Empty in the base
            # (same-origin, /vmcp/api); the public overlay points it at the API host.
            - name: VMCP_API_BASE
              valueFrom:
                configMapKeyRef: { name: platform-config, key: VMCP_API_BASE }
            # Where the optional "who are you?" greeting is pushed. Marked optional so a cluster
            # brought up without the secret still runs: the server logs the greeting to stdout
            # instead of dropping it, exactly as compose does with the value unset.
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: DISCORD_WEBHOOK_URL
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            # A single-file mount over the static bundle's résumé, so /resume.pdf is served from the
            # volume with no code change. Mounting the whole dist/client directory would shadow the
            # entire built client — the JS, the CSS, the lot.
            - name: content
              mountPath: /app/dist/client/resume.pdf
              subPath: resume.pdf
              readOnly: true
            # The whole volume, so the server can read /content/platform-version.json — the version
            # spec k8s/deploy.sh writes there, and the only way this app can know the PLATFORM's
            # version (the orchestration repo ships no image, so that version cannot ride in one).
            #
            # A second mount of the same volume, and deliberately not a subPath of the single file:
            # a subPath is resolved ONCE, at mount time, so the container would keep reading the
            # inode that existed when it started and never see a redeploy rewrite the spec. A
            # directory mount reflects the volume live, which is what lets a deploy update the
            # reported version with no rollout of home.
            #
            # readOnly, and that is a boundary not a formality: home is a CONSUMER of the deployment
            # record. A public web server must not be able to rewrite the file that says what is
            # deployed — which is also why deploy.sh writes it through a separate, ephemeral pod.
            - name: content
              mountPath: /content
              readOnly: true
            # A read-only root filesystem still needs a writable /tmp for the Node runtime.
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 256Mi }
      volumes:
        - name: content
          persistentVolumeClaim: { claimName: platform-content }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: platform
spec:
  selector: { app: home }
  ports: [{ port: 3000, targetPort: 3000 }]
