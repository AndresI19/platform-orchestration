# The platform router, ported from the compose `nginx` service. The routing itself lives in
# ./nginx.conf, which kustomization.yaml turns into a ConfigMap.
#
# Why nginx survives the move to Kubernetes instead of dissolving into Ingress annotations:
# nginx.conf does four things an Ingress cannot express natively —
#   1. splits traffic by Host header (dev / front end / api / apex-redirect),
#   2. makes the PUBLIC dashboard API read-only (`limit_except GET HEAD OPTIONS`),
#   3. rewrites the api host's clean /api/… onto the gateway's own /vmcp/api/… prefix,
#   4. answers /mcp with a 404 naming the right host on the front-end vhost.
# ingress-nginx can express (1) and (3); (2) and (4) need `configuration-snippet`, disabled by
# default since CVE-2021-25742. Keeping the conf as the single source of routing truth means the
# cluster and the compose stack route identically, and the Ingress is reduced to a dumb front door.
#
# The ConfigMap is generated (not written inline) so kustomize can hash its contents into the name:
# a changed conf then changes the Pod spec and rolls the Deployment on its own. A plain ConfigMap
# would update in place while the running nginx kept serving the old routing table — `apply` reports
# success, nothing changes, and the reason is invisible.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: nginx }
  template:
    metadata:
      labels: { app: nginx }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 8080 }]
          volumeMounts:
            # subPath so the conf lands as a single file rather than as a directory mount, which
            # would shadow the rest of /etc/nginx (mime.types, conf.d) that the image ships.
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            # Probes the router's own view of the home page, so green here means nginx resolved
            # CoreDNS and reached a backend — not merely that the process is listening.
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { memory: 128Mi }
      volumes:
        - name: conf
          # kustomize rewrites this to the hashed generated name (nginx-conf-<hash>).
          configMap: { name: nginx-conf }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: platform
spec:
  selector: { app: nginx }
  ports: [{ port: 8080, targetPort: 8080 }]
