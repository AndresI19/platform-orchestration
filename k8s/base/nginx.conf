events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # PORTED: was Docker's embedded DNS at 127.0.0.11. In-cluster this is CoreDNS, whose Service
  # IP is the .10 of the service CIDR (kubectl -n kube-system get svc kube-dns).
  #
  # Resolving at REQUEST time (via a variable in proxy_pass) rather than at startup is what lets
  # nginx boot before its backends exist — which matters more here than under compose, because a
  # rolling Deployment changes Pod IPs underneath a Service continuously.
  resolver 10.96.0.10 ipv6=off valid=10s;

  # ---------------------------------------------------------------------------------------
  # Hostname map — unchanged from compose:
  #
  #   any other Host (minikube port-forward)  → dev: whole stack, full admin (default_server)
  #   andres.project-platform.me              → public front ends (home, quiz, vMCP dashboard)
  #   api-andres.project-platform.me          → public back end (MCP endpoint + read-only API)
  #   project-platform.me / www.*             → 301 to andres.*
  # ---------------------------------------------------------------------------------------

  # Restores the visitor's real address from Cloudflare's header. Without it every request would
  # appear to come from the cloudflared Pod's IP, and the home page's per-IP rate limiter would
  # treat the whole internet as one caller.
  map $http_cf_connecting_ip $client_ip {
    ""      $remote_addr;
    default $http_cf_connecting_ip;
  }

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $client_ip;
  proxy_set_header X-Forwarded-For $client_ip;
  proxy_set_header X-Forwarded-Proto $scheme;

  # MCP streams its responses (SSE / streamable-HTTP); buffering would hold a tool result until
  # the connection closed, which a client experiences as a hang.
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  # ADDED IN THE PORT. The trailing-slash redirects below (/vmcp → /vmcp/) default to an ABSOLUTE
  # Location, which nginx builds from its own listen port and $scheme — not from how the client
  # actually reached it. Under compose that was invisible, because the published port was also 8080
  # and dev was plain http. Neither holds any more:
  #   - reached via `kubectl port-forward 18080:8080`, nginx would redirect the browser to :8080,
  #     a port nothing is listening on;
  #   - reached through the tunnel, Cloudflare terminates TLS and proxies plain http, so $scheme is
  #     "http" and an https visitor would be bounced to an http:// URL.
  # A relative Location sidesteps both: the browser resolves it against the origin it already used.
  absolute_redirect off;

  # PORTED: every upstream is now a FULLY-QUALIFIED Service name. This is load-bearing, not
  # cosmetic. nginx's `resolver` queries the name exactly as written — it does NOT apply the
  # search domains in /etc/resolv.conf, which is precisely the mechanism that makes the short
  # name `home` resolve for ordinary Kubernetes clients. Left as `http://home:3000`, CoreDNS
  # would answer NXDOMAIN and every request would 502.

  # ---------------------------------------------------------------------------------------
  # Dev / default. Under compose this was localhost:8080; in-cluster it is whatever Host a
  # `kubectl port-forward` or the Ingress sends, so it stays the default_server. Full admin
  # surface, including the writable dashboard API and /mcp.
  # ---------------------------------------------------------------------------------------
  server {
    listen 8080 default_server;
    server_name _;

    location / {
      set $home http://home.platform.svc.cluster.local:3000;
      proxy_pass $home;
    }

    location = /cloud-developer-quiz { return 301 /cloud-developer-quiz/; }
    location /cloud-developer-quiz/ {
      set $quiz http://quiz.platform.svc.cluster.local:80;
      proxy_pass $quiz;
    }

    location = /vmcp { return 301 /vmcp/; }
    location /vmcp/ {
      set $vmcp http://vmcp.platform.svc.cluster.local:8001;
      proxy_pass $vmcp;
    }

    location /mcp {
      set $vmcpmcp http://vmcp.platform.svc.cluster.local:8001;
      proxy_pass $vmcpmcp;
    }

    # The identity service. It must be reachable from the BROWSER — the quiz's sign-in gate calls it
    # directly — so it is routed here rather than kept internal.
    #
    # POST is the whole API (sign up, sign in), so unlike the dashboard's data API this cannot be
    # method-restricted. Its defence is its own rate limiter, not nginx's.
    location /auth/ {
      set $authsvc http://platform-auth.platform.svc.cluster.local:8002;
      proxy_pass $authsvc;
    }

    # The public keys. Anyone may fetch them; that is what a public key is for.
    location = /.well-known/jwks.json {
      set $authjwks http://platform-auth.platform.svc.cluster.local:8002;
      proxy_pass $authjwks;
    }
  }

  # ---------------------------------------------------------------------------------------
  # Public FRONT END.
  # ---------------------------------------------------------------------------------------
  server {
    listen 8080;
    server_name andres.project-platform.me;

    location / {
      set $home http://home.platform.svc.cluster.local:3000;
      proxy_pass $home;
    }

    location = /cloud-developer-quiz { return 301 /cloud-developer-quiz/; }
    location /cloud-developer-quiz/ {
      set $quiz http://quiz.platform.svc.cluster.local:80;
      proxy_pass $quiz;
    }

    # The method filter that used to live here is GONE, and that is an upgrade rather than a
    # relaxation.
    #
    # It existed because the dashboard's writes were unauthenticated — a stranger's edit button on
    # the gateway. It was a ROUTING-layer control (bypass nginx and you bypass it), and it was
    # documented as a stopgap from the day it went in.
    #
    # The gateway now requires a signed ADMIN claim to change anything, checked inside the thing
    # being protected. Keeping the filter as well would add no defence: nginx cannot read a JWT, so
    # it cannot tell an admin from anyone else — it would simply lock the admin out of their own
    # dashboard on the public site. Reads stay open, because a dashboard is for looking at.
    location /vmcp/api/ {
      set $vmcpapi http://vmcp.platform.svc.cluster.local:8001;
      proxy_pass $vmcpapi;
    }

    location = /vmcp { return 301 /vmcp/; }
    location /vmcp/ {
      set $vmcp http://vmcp.platform.svc.cluster.local:8001;
      proxy_pass $vmcp;
    }

    # Answered explicitly rather than left to fall through: without this, /mcp would land on the
    # home page's SPA catch-all and a misconfigured MCP client would get 200 OK + HTML, which
    # reads as "connected" and then fails somewhere far less obvious.
    location /mcp {
      default_type text/plain;
      return 404 "The MCP endpoint moved to https://api-andres.project-platform.me/mcp\n";
    }

    # The identity service. It must be reachable from the BROWSER — the quiz's sign-in gate calls it
    # directly — so it is routed here rather than kept internal.
    #
    # POST is the whole API (sign up, sign in), so unlike the dashboard's data API this cannot be
    # method-restricted. Its defence is its own rate limiter, not nginx's.
    location /auth/ {
      set $authsvc http://platform-auth.platform.svc.cluster.local:8002;
      proxy_pass $authsvc;
    }

    # The public keys. Anyone may fetch them; that is what a public key is for.
    location = /.well-known/jwks.json {
      set $authjwks http://platform-auth.platform.svc.cluster.local:8002;
      proxy_pass $authjwks;
    }
  }

  # ---------------------------------------------------------------------------------------
  # Public BACK END: the MCP protocol endpoint plus the read-only data API the front ends poll.
  # ---------------------------------------------------------------------------------------
  server {
    listen 8080;
    server_name api-andres.project-platform.me;

    # POST is MCP's transport, so this cannot be method-restricted — the gateway's own bearer
    # check is what gates tool execution.
    location /mcp {
      set $vmcpmcp http://vmcp.platform.svc.cluster.local:8001;
      proxy_pass $vmcpmcp;
      proxy_buffering off;
      proxy_read_timeout 1h;
    }

    # The gateway serves these under its own /vmcp/ prefix, so the prefix is added back here:
    # the public path stays clean and the app behind it is unchanged.
    location /api/ {
      limit_except GET HEAD OPTIONS { deny all; }
      set $vmcpapi http://vmcp.platform.svc.cluster.local:8001;
      rewrite ^/api/(.*)$ /vmcp/api/$1 break;
      proxy_pass $vmcpapi;
    }

    location = /health {
      set $vmcphealth http://vmcp.platform.svc.cluster.local:8001;
      proxy_pass $vmcphealth;
    }

    location / { return 404 "api host: use /mcp, /api/… or /health\n"; }

    # The identity service. It must be reachable from the BROWSER — the quiz's sign-in gate calls it
    # directly — so it is routed here rather than kept internal.
    #
    # POST is the whole API (sign up, sign in), so unlike the dashboard's data API this cannot be
    # method-restricted. Its defence is its own rate limiter, not nginx's.
    location /auth/ {
      set $authsvc http://platform-auth.platform.svc.cluster.local:8002;
      proxy_pass $authsvc;
    }

    # The public keys. Anyone may fetch them; that is what a public key is for.
    location = /.well-known/jwks.json {
      set $authjwks http://platform-auth.platform.svc.cluster.local:8002;
      proxy_pass $authjwks;
    }
  }

  # ---------------------------------------------------------------------------------------
  # Apex + www → the tenant, keeping project-platform.me free to become the platform's own
  # front door later.
  # ---------------------------------------------------------------------------------------
  server {
    listen 8080;
    server_name project-platform.me www.project-platform.me;
    return 301 https://andres.project-platform.me$request_uri;
  }
}
