# One Postgres server, several databases, one owner each.
#
# `auth` belongs to platform-auth. `quiz` belongs to the quiz server. They share a SERVER — one pod,
# one backup, one thing to operate — and they do NOT share a schema. Neither service can read or
# migrate the other's tables; they exchange the JWT's `sub` and that is the entire contract.
#
# That distinction is the point. Two services reading one schema is the distributed-monolith trap: a
# migration in one silently breaks the other, and neither can be deployed independently — and you
# would have coupled them at the worst possible layer while believing you had saved a pod.
#
# vmcp-db stays where it is. Folding its live data in here is a migration, not a freebie.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-db
  namespace: platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-db-init
  namespace: platform
data:
  # Runs ONCE, on an empty data directory — postgres's own initdb hook. It is not a migration system
  # and must not be treated as one: change it after the volume exists and nothing happens.
  init.sql: |
    CREATE DATABASE auth;
    CREATE DATABASE quiz;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-db
  namespace: platform
spec:
  replicas: 1
  strategy: { type: Recreate } # a single Postgres owns the volume
  selector:
    matchLabels: { app: platform-db }
  template:
    metadata:
      labels: { app: platform-db }
    spec:
      # Postgres runs as uid 999 (the image's postgres user), non-root, on a read-only root fs.
      #
      # Deliberately NO fsGroup: it would recursively chmod the data PV group-writable, and postgres
      # refuses to start on a PGDATA that is not 0700/0750 ("data directory has invalid permissions").
      # Keeping fsGroup off preserves the existing data dir's 0700 exactly — no migration, no risk to
      # live data. The cost is that the writable emptyDirs (socket dir, /tmp) come up owned by root, so
      # the fix-perms init below chowns them to 999 before postgres starts.
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      initContainers:
        - name: fix-perms
          image: postgres:16
          # Runs as root ONLY to chown the two emptyDirs to the postgres uid; it touches nothing on
          # the (read-only) root fs and drops every capability except the CHOWN it needs.
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"], add: ["CHOWN"] }
          command: ["sh", "-c", "chown 999:999 /var/run/postgresql /tmp"]
          volumeMounts:
            - { name: run, mountPath: /var/run/postgresql }
            - { name: tmp, mountPath: /tmp }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 32Mi }
      containers:
        - name: postgres
          image: postgres:16
          ports: [{ containerPort: 5432 }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          envFrom:
            - secretRef: { name: platform-db }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
            # Read-only root fs: postgres's unix socket dir and scratch space must be writable.
            - { name: run, mountPath: /var/run/postgresql }
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "platform"] }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits: { memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: platform-db }
        - name: init
          configMap: { name: platform-db-init }
        - { name: run, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: platform-db
  namespace: platform
spec:
  selector: { app: platform-db }
  ports: [{ port: 5432, targetPort: 5432 }]
