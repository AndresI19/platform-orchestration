# A deliberately dumb front door: every path goes to the nginx Deployment, which owns the routing.
#
# The original scaffold's Ingress mapped /, /cloud-developer-quiz, /vmcp and /mcp straight at the app
# Services — re-deriving nginx.conf's path map as Ingress rules. That left two routing tables to keep
# in sync, and it could only ever express the easy half: there is no way to say "the public dashboard
# API is read-only" or "/mcp 404s on the front-end host but serves on the api host" in an Ingress,
# because those need `configuration-snippet`, disabled by default since CVE-2021-25742.
#
# So routing lives in exactly one place (the ConfigMap in nginx.yaml) and this Ingress just hands
# nginx the traffic. ingress-nginx forwards the Host header untouched, which is what keeps nginx's
# vhost split working through it.
#
# This is only the LOCAL entry point. The public site does not arrive here — it comes through the
# cloudflared Pod in k8s/public/, which dials OUT to Cloudflare and reaches the same nginx Service
# from inside the cluster, with no ingress controller in the path at all.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  namespace: platform
  annotations:
    # MCP streams over SSE / streamable-HTTP. Left buffering, the controller would hold a tool result
    # until the connection closed, which a client experiences as a hang.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port: { number: 8080 }
