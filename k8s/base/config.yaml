# The non-secret half of compose's `.env`. These are the values the apps read at RUNTIME, which is
# what lets one image serve both the local cluster and the public site with no rebuild.
#
# The base values here are the LOCAL ones (empty = same-origin), matching what `docker compose up`
# gives you with an unfilled .env. The `public/` overlay patches them to the real hostnames.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  # Where the dashboard and the home page's liveness probes read the gateway registry from.
  # Empty = same-origin (/vmcp/api), which is what a local cluster behind nginx wants.
  VMCP_API_BASE: ""
  # Origins allowed to call the data API cross-site. Only needed once the front end and the API
  # live on different hostnames — i.e. only in the public overlay.
  CORS_ORIGINS: ""
  # Links the dashboard's "← Home" back through the proxy to the platform home page.
  HOME_URL: "/"
  # The MCP endpoint the dashboard TELLS CLIENTS to connect to. Empty = same-origin (/mcp behind
  # this proxy), which is right locally. NOT an in-cluster Service address: the client reading it
  # (Claude Desktop, an SDK) runs outside the cluster, where cluster DNS does not resolve.
  MCP_PUBLIC_URL: ""
  # The token issuer, as it appears in every JWT's `iss`. It is a public URL because a verifier
  # anywhere must be able to recognise it — it is an identifier, not an endpoint we call.
  AUTH_ISSUER: "https://api-andres.project-platform.me/auth"
  # Where verifiers FETCH the public keys. In-cluster: this one IS an endpoint, it is called
  # service-to-service, and it never leaves the cluster — so it takes the Service address.
  AUTH_JWKS_URI: "http://platform-auth:8002/.well-known/jwks.json"
  # How often the FVT runner replays the suite. 14400 = every 4 hours; each run makes ~54 live
  # calls against the RuneScape wiki / GE APIs, so a tighter loop is free traffic against someone
  # else's API for no extra signal.
  FVT_INTERVAL_SECONDS: "14400"
#
# The SECRET half of .env is deliberately absent from this file, and that is a design decision worth
# stating: `platform-secrets` (DISCORD_WEBHOOK_URL) is created OUT-OF-BAND from the gitignored .env,
# and is declared NOWHERE in the base — see k8s/README.md.
#
# A committed placeholder Secret of the same name would be worse than no Secret at all: kustomize
# would render it with an empty value, and every subsequent `kubectl apply -k` would silently
# overwrite the real webhook you created by hand. Leaving it out means apply cannot clobber it.
#
# Nothing breaks in its absence, because every consumer marks the key `optional: true` — a cluster
# without the secret still comes up, and the home server logs its "who are you?" greeting to stdout
# instead of pushing it, exactly as compose does with the value unset.
