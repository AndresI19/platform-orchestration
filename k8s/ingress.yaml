# Mirrors the nginx path map. ingress-nginx forwards the matched path UNCHANGED to the backend
# (no rewrite), which is exactly what the base-path-aware apps need — same contract as the compose
# nginx. Enable the controller with: minikube addons enable ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  namespace: platform
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /cloud-developer-quiz
            pathType: Prefix
            backend:
              service:
                name: quiz
                port: { number: 80 }
          - path: /vmcp
            pathType: Prefix
            backend:
              service:
                name: vmcp
                port: { number: 8001 }
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: vmcp
                port: { number: 8001 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home
                port: { number: 3000 }
