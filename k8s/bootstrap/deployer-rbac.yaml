# The identity the CI/CD runner deploys as.
#
# It is NOT the admin kubeconfig, and it deliberately cannot be. The runner is a container; the
# host's kubeconfig authenticates with client certificates under ~/.minikube, which sits OUTSIDE the
# one directory colima mounts into the VM — so no container can read them. Rather than widen that
# mount (the thing that stops a CI job reading ~/.ssh, the tunnel token and the sealed-secrets master
# key), the runner gets an identity of its own, scoped to exactly what a deploy does.
#
# What a deploy does, and therefore all this may do:
#   * patch a Deployment's image, and watch the rollout            (the deploy itself)
#   * undo a rollout                                               (the failure path)
#   * read Deployments                                             (rebuild the version spec from live state)
#   * create/delete a Pod and exec into it                         (write platform-version.json onto the PV)
#
# What it may NOT do, and this is the point: read Secrets. A runner executing code from a public repo
# must not be able to read the sealed secrets' decrypted values, the Postgres passwords, or the
# Cloudflare tunnel token — all of which live as Secrets in this namespace. Deploying an image does
# not require reading them, so it cannot.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: platform
rules:
  # The deploy: set the image, then watch it land. `watch` is NOT optional: `kubectl rollout status`
  # opens a WATCH on the Deployment, and without it the command fails with "cannot watch", times out,
  # and deploy.sh does a FALSE rollback of a deploy that actually succeeded. (Fast rollouts that finish
  # on the first `get` hid this — they never reached the watch — which is why home/quiz/vmcp slipped
  # through and platform-auth did not.)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # `kubectl rollout undo` reads and patches the ReplicaSets behind a Deployment, and rollout status
  # watches them too.
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # `rollout status` watches Pods; the version spec is written by an ephemeral pod this creates.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # The writer pod mounts the content PVC; creating it requires being able to see the claim.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Deliberately absent: secrets. See the note above — this is the whole reason for a scoped identity.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deployer
subjects:
  - kind: ServiceAccount
    name: deployer
    namespace: platform
---
# Kubernetes 1.24+ stopped auto-creating a token Secret for a ServiceAccount, and the runner needs a
# long-lived credential it can carry in a kubeconfig (a TokenRequest token expires and the runner has
# no way to refresh it mid-job). This asks the control plane to mint one and keep it.
apiVersion: v1
kind: Secret
metadata:
  name: deployer-token
  namespace: platform
  annotations:
    kubernetes.io/service-account.name: deployer
type: kubernetes.io/service-account-token
