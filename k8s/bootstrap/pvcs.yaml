# The platform's persistent volumes — BOOTSTRAP, deliberately out of the Helm chart: a `helm uninstall`
# (or botched upgrade) must never take the Postgres data or résumé/card content with it. Applied once
# with kubectl, referenced by the chart's Deployments by name, Helm never owns — so never deletes — the
# data. As long-lived as the cluster. Mounted by claimName (platform-content, platform-db, vmcp-db);
# applying the chart where these already hold data just re-attaches.
---
# resume.pdf, the quiz card decks, and platform-version.json (written by the version-writer hook).
# ReadWriteOnce is honest, not aspirational: minikube's hostPath provisioner is single-node and RWO is
# enforced per NODE, so home and quiz both mount it concurrently. A real multi-node cluster would need
# RWX or one volume per app.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-content
  namespace: platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 256Mi
---
# The shared Postgres server's data — two databases (auth, quiz), one owner each. See the chart's
# postgres template for why they share a server but not a schema.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-db
  namespace: platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
# The vMCP gateway's own Postgres data. Kept separate from platform-db on purpose — folding it in is a
# migration, not a freebie.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vmcp-db
  namespace: platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
