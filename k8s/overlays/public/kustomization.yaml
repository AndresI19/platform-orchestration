apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: platform

# The PUBLIC overlay — the Kubernetes equivalent of `docker compose --profile public up -d`.
# It adds the cloudflared connector and repoints the apps' runtime config at the real hostnames.
#
#     kubectl apply -k k8s/public/
#
# ---------------------------------------------------------------------------------------------
# READ BEFORE APPLYING: this is a CUTOVER, not an addition.
#
# The compose stack's cloudflared is (or was) serving the same tunnel. Cloudflare treats every
# connector registered against a tunnel as an HA replica and load-balances across them — so running
# both at once does not "fail over" to one, it SPLITS live traffic roughly in half between the
# compose stack and this cluster, with no way for a visitor to tell which one answered. Two stacks
# with two different Postgres volumes serving one hostname is a debugging nightmare that looks, from
# the outside, like an intermittently flaky site.
#
# So the order matters:
#
#     docker compose --profile public down cloudflared   # stop the old connector FIRST
#     kubectl -n platform create secret generic cloudflared \
#       --from-env-file=<(grep '^CLOUDFLARE_TUNNEL_TOKEN=' ../.env | sed 's/^CLOUDFLARE_TUNNEL_TOKEN=/TUNNEL_TOKEN=/')
#     kubectl apply -k k8s/public/
#
# To roll back, reverse it: delete this overlay, then bring compose's cloudflared back up.
# ---------------------------------------------------------------------------------------------
resources:
  - ../../base
  - sealed-cloudflared.yaml # the tunnel token, encrypted — safe to commit
  - cloudflared.yaml

# The apps read these at runtime, so the SAME images that serve the local cluster serve the public
# site — the overlay changes config, never an image tag. Empty in the base (same-origin); real
# hostnames here, because the front end and the API now live on different hosts and the browser
# would otherwise block every dashboard fetch on CORS.
patches:
  - target:
      kind: ConfigMap
      name: platform-config
    patch: |-
      - op: replace
        path: /data/VMCP_API_BASE
        value: https://api-andres.project-platform.me
      - op: replace
        path: /data/CORS_ORIGINS
        value: https://andres.project-platform.me
      - op: replace
        path: /data/MCP_PUBLIC_URL
        value: https://api-andres.project-platform.me/mcp
