# A thin pointer at base/, so the obvious command keeps working:
#
#     kubectl apply -k k8s/            # the local stack (base)
#     kubectl apply -k k8s/overlays/public/   # local stack + the public cloudflared front door
#
# base/ and overlays/ are separate directories because kustomize refuses to let an overlay live
# inside the base it consumes — the base would transitively contain its own consumer.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base
