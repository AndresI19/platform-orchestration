apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: home }
  template:
    metadata:
      labels: { app: home }
    spec:
      containers:
        - name: home
          image: platform-home:latest
          # Local minikube images (built via `minikube docker-env`) aren't in a registry.
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          env:
            - { name: PORT, value: "3000" }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: platform
spec:
  selector: { app: home }
  ports: [{ port: 3000, targetPort: 3000 }]
