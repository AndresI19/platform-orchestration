apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmcp
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: vmcp }
  template:
    metadata:
      labels: { app: vmcp }
    spec:
      # The image entrypoint runs migrations + seed before serving, so wait for Postgres first.
      initContainers:
        - name: wait-for-db
          image: postgres:16
          command:
            ["sh", "-c", "until pg_isready -h vmcp-db -U vmcp -d vmcp; do echo waiting for db; sleep 2; done"]
      containers:
        - name: vmcp
          image: platform-vmcp:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8001 }]
          env:
            - { name: PORT, value: "8001" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: vmcp-db, key: DATABASE_URL }
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vmcp
  namespace: platform
spec:
  selector: { app: vmcp }
  ports: [{ port: 8001, targetPort: 8001 }]
