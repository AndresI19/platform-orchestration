# Demo credentials for the local cluster only. In a real deployment, generate these out-of-band
# (e.g. a sealed-secret or an external secret store) and never commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: vmcp-db
  namespace: platform
type: Opaque
stringData:
  POSTGRES_USER: vmcp
  POSTGRES_PASSWORD: vmcp # PLACEHOLDER — replace for anything beyond a local demo.
  POSTGRES_DB: vmcp
  DATABASE_URL: postgres://vmcp:vmcp@vmcp-db:5432/vmcp
