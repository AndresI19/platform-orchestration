apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels: { app: quiz }
  template:
    metadata:
      labels: { app: quiz }
    spec:
      containers:
        - name: quiz
          image: platform-quiz:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
          env:
            - { name: PORT, value: "80" }
            # Must match the BASE_PATH baked into the image at build time.
            - { name: BASE_PATH, value: "/cloud-developer-quiz/" }
          readinessProbe:
            httpGet: { path: /cloud-developer-quiz/api/health, port: 80 }
            initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quiz
  namespace: platform
spec:
  selector: { app: quiz }
  ports: [{ port: 80, targetPort: 80 }]
